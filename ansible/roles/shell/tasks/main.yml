---
# zsh + Oh My Zsh をセットアップし、既定シェルを zsh にする。
# .zshrc 自体は dotfiles role が symlink で配置する。

- name: Ensure zsh is installed
  package:
    name: zsh
    state: present
  become: yes

- name: Install Oh My Zsh (clone, non-interactive)
  git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: "{{ ansible_env.HOME }}/.oh-my-zsh"
    depth: 1
    version: master
    update: no

- name: Get path of zsh binary
  command: which zsh
  register: zsh_path
  changed_when: false

- name: Set zsh as the default login shell
  user:
    name: "{{ ansible_env.USER }}"
    shell: "{{ zsh_path.stdout }}"
  become: yes
