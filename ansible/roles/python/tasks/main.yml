- name: Install dependencies for pyenv
  become: yes
  apt:
    name: "{{ pyenv_dependencies }}"
    state: present
    update_cache: yes

- name: Clone pyenv
  become: no
  git:
    repo: https://github.com/pyenv/pyenv.git
    dest: "{{ pyenv_root }}"

- name: Clone pyenv-virtualenv
  become: no
  git:
    repo: https://github.com/pyenv/pyenv-virtualenv.git
    dest: "{{ pyenv_root }}/plugins/pyenv-virtualenv"

- name: Setup pyenv in zshrc
  become: no
  blockinfile:
    path: "/home/{{ target_user }}/.zshrc"
    marker: "# {mark} PYENV SETUP"
    create: yes
    block: |
      export PYENV_ROOT="{{ pyenv_root }}"
      export PATH="$PYENV_ROOT/bin:$PATH"
      eval "$(pyenv init --path)"
      eval "$(pyenv init -)"
      eval "$(pyenv virtualenv-init -)"

- name: Install Python versions
  become: no
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init --path)"
    eval "$(pyenv init -)"
    pyenv install -s {{ item }}
  args:
    executable: /bin/bash
  loop: "{{ python_versions }}"

- name: Set global Python version
  become: no
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init --path)"
    eval "$(pyenv init -)"
    pyenv global {{ global_python_version }}
  args:
    executable: /bin/bash

- name: Create virtualenvs
  become: no
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init --path)"
    eval "$(pyenv init -)"
    eval "$(pyenv virtualenv-init -)"
    pyenv virtualenv -f {{ item.version }} {{ item.name }}
  args:
    executable: /bin/bash
  loop: "{{ virtualenvs }}"
