---
# pyenv / pyenv-virtualenv の導入と Python バージョン・仮想環境の作成。
# pyenv の初期化(eval)は dotfiles の .zshrc 側で行うため、ここでは設定ファイルを編集しない。

- name: Install build dependencies for pyenv
  apt:
    name: "{{ pyenv_dependencies }}"
    state: present
    update_cache: yes
  become: yes

- name: Clone pyenv
  git:
    repo: https://github.com/pyenv/pyenv.git
    dest: "{{ pyenv_root }}"
    update: no

- name: Clone pyenv-virtualenv
  git:
    repo: https://github.com/pyenv/pyenv-virtualenv.git
    dest: "{{ pyenv_root }}/plugins/pyenv-virtualenv"
    update: no

- name: Install Python versions
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init --path)"
    pyenv install -s {{ item }}
  args:
    executable: /bin/bash
    creates: "{{ pyenv_root }}/versions/{{ item }}"
  loop: "{{ python_versions }}"

- name: Set global Python version
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init --path)"
    pyenv global {{ global_python_version }}
  args:
    executable: /bin/bash
  changed_when: false

- name: Create virtualenvs
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init --path)"
    eval "$(pyenv virtualenv-init -)"
    pyenv virtualenv {{ item.version }} {{ item.name }}
  args:
    executable: /bin/bash
    creates: "{{ pyenv_root }}/versions/{{ item.version }}/envs/{{ item.name }}"
  loop: "{{ virtualenvs }}"
  loop_control:
    label: "{{ item.name }} ({{ item.version }})"
